server {
    listen 8080;
    server_name localhost;

    root /home/bara/Projects/Niham/niham/public;
    index index.php index.html;

    charset utf-8;

    # ── Laravel Fallback Routing ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM via Unix Socket ───────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass  unix:/run/php-fpm/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include       fastcgi_params;

        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 60;
    }

    # ── Static Assets: Cache & Silence Logs ───────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # ── Deny Dotfiles (except .well-known) ────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Deny Access to Sensitive Laravel Paths ────────────────────
    location ~ ^/(\.env|artisan|composer\.(json|lock)|package\.json) {
        deny all;
    }

    # ── Logging ───────────────────────────────────────────────────
    error_log  /var/log/nginx/niham_error.log;
    access_log /var/log/nginx/niham_access.log main;
}
